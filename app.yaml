apiVersion: v1
name: getpod-manager
version: 1.0.0
description: VM resize, SSH keys, and usage metrics
author: 0xMaxMa

services:
  api:
    build: .
    resources:
      cpu: 0.5
      memory: 128M
    ports:
      - name: api
        host: 5990
        container: 5990
        type: api
    environment:
      - API_KEY
      - USER_HOME
    cap_add:
      - DAC_READ_SEARCH
      - DAC_OVERRIDE
    volumes:
      - ${USER_HOME}/.ssh/authorized_keys:/host-ssh/authorized_keys:rw
      - /proc/stat:/host-proc/stat:ro
      - /proc/meminfo:/host-proc/meminfo:ro
      - ${USER_HOME}/.local/share/code-server:/host-code-server:rw
    gateway_api:
      socket: /run/gateway.sock
      scripts:
        resize-disk:
          path: scripts/resize-disk.sh
          timeout: 60s
        online-cpus:
          path: scripts/online-cpus.sh
          timeout: 10s
        online-memory:
          path: scripts/online-memory.sh
          timeout: 10s
        disk-info:
          path: scripts/disk-info.sh
          timeout: 5s
    healthcheck:
      test: wget -qO- http://localhost:5990/health
      interval: 30s
